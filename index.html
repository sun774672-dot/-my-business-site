<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Petal & Grace — Доставка квітів у Києві</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --c: #f7f2ed;
            --c2: #f0e6dc;
            --w: #fff;
            --tx: #4c2d22;
            --mu: #9a7060;
            --ln: #e5cfc1;
            --ro: #d28c74;
            --te: #b76449;
            --te2: #9a4f38;
            --br: #6b3320;
            --gr: #25a244;
            --tg: #2aabee;
            --sh: 0 8px 32px rgba(107,51,32,.12);
            --sh2: 0 3px 14px rgba(107,51,32,.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Jost', sans-serif;
            background: var(--c);
            color: var(--tx);
            overflow-x: hidden;
        }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        img { display: block; width: 100%; height: 100%; object-fit: cover; }

        .W { width: min(1160px, 92%); margin: 0 auto; }
        section { padding: 70px 0; }

        /* ─── TYPE ─── */
        .serif { font-family: 'Cormorant Garamond', serif; }
        .tag-label {
            font-size: .72rem;
            text-transform: uppercase;
            letter-spacing: .2em;
            color: var(--ro);
            margin-bottom: 8px;
        }
        .sec-h {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 4vw, 3.2rem);
            line-height: 1.1;
            color: var(--br);
            margin-bottom: 12px;
            font-weight: 700;
        }
        .sec-h em {
            color: var(--ro);
            font-style: italic;
            font-weight: 600;
        }
        .sec-p {
            color: var(--mu);
            line-height: 1.95;
            font-size: .96rem;
            max-width: 680px;
            margin: 0 auto;
        }
        .center { text-align: center; margin-bottom: 44px; }

        /* ─── BUTTONS ─── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            border: none;
            cursor: pointer;
            border-radius: 999px;
            font-family: 'Jost', sans-serif;
            font-weight: 500;
            transition: .2s;
            font-size: .92rem;
            padding: 13px 24px;
        }
        .btn-main {
            background: var(--te);
            color: #fff;
            box-shadow: 0 5px 18px rgba(183,100,73,.28);
        }
        .btn-main:hover {
            background: var(--te2);
            transform: translateY(-2px);
        }
        .btn-out {
            border: 1.5px solid var(--te);
            color: var(--te);
            background: transparent;
        }
        .btn-out:hover {
            background: rgba(183,100,73,.07);
            transform: translateY(-1px);
        }
        .btn-wh {
            background: rgba(255,255,255,.16);
            border: 1px solid rgba(255,255,255,.35);
            color: #fff;
        }
        .btn-wh:hover { background: rgba(255,255,255,.26); }
        .btn-sm { padding: 9px 17px; font-size: .83rem; }
        .btn-full { width: 100%; justify-content: center; }

        /* ─── TOPBAR ─── */
        .topbar {
            background: var(--br);
            color: rgba(243,221,207,.85);
            text-align: center;
            padding: 9px 16px;
            font-size: .79rem;
        }
        .topbar strong { color: #f3ddcf; }

        /* ─── NAV ─── */
        .nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(247,242,237,.97);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--ln);
        }
